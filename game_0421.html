<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026/04/21 台灣華語小遊戲</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap');
        :root { --bg-color: #FFF0F5; --primary-pink: #FFB6C1; --hover-pink: #FF69B4; --selected-purple: #DDA0DD; --matched-purple: #9370DB; --text-color: #5D4037; --hp-green: #2ECC71; --hp-red: #E74C3C; }
        * { box-sizing: border-box; font-family: 'Nunito', 'Microsoft JhengHei', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* 導航 */
        .top-nav { width: 100%; max-width: 600px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .icon-btn { background: #fff; border: 2px solid var(--primary-pink); border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--hover-pink); box-shadow: 0 4px 0px var(--primary-pink); cursor: pointer; text-decoration: none; }
        .icon-btn:active { transform: translateY(4px); box-shadow: 0 0px 0px var(--primary-pink); }
        h1, h2 { color: var(--hover-pink); margin: 0; text-shadow: 2px 2px 0px #FFF; text-align: center; flex-grow: 1; }
        h1 { font-size: clamp(1.1rem, 4vw, 1.4rem); } h2 { font-size: clamp(1.2rem, 4vw, 1.4rem); color: var(--selected-purple); }

        .page { display: none; width: 100%; max-width: 600px; animation: fadeIn 0.4s; }
        .page.active { display: flex; flex-direction: column; align-items: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 下拉選單 */
        details { width: 100%; background: #fff; border-radius: 15px; border: 2px solid var(--primary-pink); margin-bottom: 20px; overflow: hidden; }
        summary { background: var(--primary-pink); color: #fff; padding: 12px 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; list-style: none; text-align: center; position: relative; }
        summary::after { content: ' ▼'; font-size: 0.8rem; transition: transform 0.3s; display: inline-block; }
        details[open] summary::after { transform: rotate(180deg); }
        .vocab-item { display: flex; justify-content: space-between; padding: 10px 20px; border-bottom: 1px dashed var(--primary-pink); font-size: 1.1rem; font-weight: bold; color: var(--matched-purple); }

        .game-menu { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-btn { background: #fff; border: 3px solid var(--primary-pink); padding: 15px 5px; font-size: 1.1rem; font-weight: bold; color: var(--hover-pink); border-radius: 20px; cursor: pointer; box-shadow: 0 5px 0px var(--primary-pink); text-align: center; }
        
        /* 狗狗動畫 */
        .dog-header { font-size: 3rem; height: 70px; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; position: relative; }
        .dog-head { transition: all 0.3s; }
        .dog-msg { position: absolute; top: -10px; right: 25%; background: #fff; border-radius: 10px; padding: 2px 8px; font-size: 1rem; opacity: 0; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 5; }
        .happy .dog-head { animation: jump 0.5s ease; } .happy .dog-msg { opacity: 1; color: orange; content: "✨"; }
        .sad .dog-head { animation: shake 0.5s ease; } .sad .dog-msg { opacity: 1; color: blue; }
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px) scale(1.1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        /* 卡片共用樣式 */
        .card { background-color: var(--primary-pink); color: #fff; font-weight: bold; display: flex; justify-content: center; align-items: center; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 0px #FF94A8; font-size: clamp(1rem, 4vw, 1.3rem); padding: 12px 5px; text-align: center; white-space: nowrap; transition: all 0.2s; margin-bottom: 10px;}
        .card.selected { background-color: var(--selected-purple); box-shadow: 0 4px 0px #BA55D3; transform: scale(1.05); }
        .card.matched { background-color: var(--matched-purple); box-shadow: 0 2px 0px #4B0082; cursor: default; transform: translateY(2px); }
        .congrats-text { color: var(--matched-purple); font-weight: bold; font-size: 1.3rem; margin: 15px 0; display: none; text-align: center; width: 100%; }

        /* 遊戲排版與圖層限制解決 */
        .cols-board { width: 100%; display: flex; justify-content: space-between; gap: 10px; position: relative;}
        #g3-zh { z-index: 999; position: relative; flex: 1; display: flex; flex-direction: column; }
        #g3-zy { z-index: 1; position: relative; flex: 1; display: flex; flex-direction: column; }
        .col-normal { flex: 1; display: flex; flex-direction: column; }

        /* 翻牌遊戲 */
        .memory-board { width: 100%; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .memory-card { aspect-ratio: 3/4; perspective: 1000px; cursor: pointer; }
        .memory-card-inner { width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; position: relative; }
        .memory-card.flipped .memory-card-inner, .memory-card.matched .memory-card-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-weight: bold; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .front { background-color: var(--primary-pink); color: white; font-size: 1.5rem; }
        .back { background-color: #fff; color: var(--matched-purple); border: 2px solid var(--matched-purple); transform: rotateY(180deg); font-size: clamp(0.9rem, 3.5vw, 1.3rem); }
        .memory-card.matched .back { background-color: var(--matched-purple); color: #fff; }

        /* 餵食小狗拖拉樣式 */
        .g3-anim-zone { font-size: 4.5rem; text-align: center; margin-bottom: 10px; transition: transform 0.3s; height: 90px;}
        .draggable { touch-action: none; cursor: grab; z-index: 1000 !important; background: #fff; color: var(--hover-pink); border: 3px solid var(--primary-pink); }
        .draggable.dragging { cursor: grabbing; background: var(--selected-purple); color: white; z-index: 9999 !important; box-shadow: 0 10px 20px rgba(0,0,0,0.2);}
        .draggable.matched { background: var(--matched-purple); color: white; border-color: var(--matched-purple); z-index: 1 !important; transform: translate(0,0) !important; }
        .dropzone { background: var(--primary-pink); color: white; font-weight: bold; border-radius: 12px; padding: 15px 5px; text-align: center; white-space: nowrap; font-size: clamp(1rem, 4vw, 1.2rem); margin-bottom: 10px; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); z-index: 1; border: 2px solid transparent;}

        /* 打怪戰鬥樣式 */
        .battle-arena { width: 100%; display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
        .char-row { display: flex; justify-content: space-around; align-items: flex-end; padding: 10px; background: #fff; border-radius: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.05);}
        .char-box { display: flex; flex-direction: column; align-items: center; width: 42%; }
        .sprite { font-size: 3.5rem; position: relative; margin-top: 5px; }
        .hp-container { width: 100%; background: #ddd; border-radius: 10px; height: 15px; border: 2px solid #fff; position: relative; overflow: hidden;}
        .hp-bar { height: 100%; background: var(--hp-green); transition: width 0.3s, background-color 0.3s; }
        .hp-text { position: absolute; width: 100%; text-align: center; font-size: 0.7rem; top: 0; font-weight: bold; line-height: 12px; color: #333;}
        .question-box { background: #fff; border: 3px dashed var(--hover-pink); border-radius: 15px; padding: 15px; text-align: center; font-size: 1.4rem; font-weight: bold; color: var(--text-color); }
        .options-grid { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .opt-btn { background: #fff; border: 2px solid var(--primary-pink); border-radius: 12px; padding: 15px; font-size: 1.2rem; font-weight: bold; color: var(--text-color); cursor: pointer; box-shadow: 0 4px 0px var(--primary-pink); }
        @keyframes atkR { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(40px) scale(1.1); } }
        @keyframes atkL { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-40px) scale(1.1); } }
        @keyframes hitE { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px) rotate(-5deg); filter: brightness(0.7) sepia(1) hue-rotate(-50deg); } 75% { transform: translateX(5px) rotate(5deg); filter: brightness(0.7) sepia(1) hue-rotate(-50deg); } }
    </style>
</head>
<body>

    <div id="menu-page" class="page active">
        <div class="top-nav">
            <a href="index.html" class="icon-btn">🏠</a>
            <h1 id="main-title">載入中...</h1>
            <div style="width: 45px;"></div>
        </div>
        <details>
            <summary>📝 本次生詞與注音</summary>
            <div id="vocab-list"></div>
        </details>
        <div class="game-menu">
            <button class="menu-btn" onclick="openGame(1)">🌸 1. 注音配對</button>
            <button class="menu-btn" onclick="openGame(2)">🧩 2. 翻牌配對</button>
            <button class="menu-btn" onclick="openGame(3)">🍖 3. 餵食小狗</button>
            <button class="menu-btn" onclick="openGame(4)">⚔️ 4. 答題打怪</button>
        </div>
    </div>

    <div id="game1-page" class="page">
        <div class="top-nav"><div class="icon-btn" onclick="showPage('menu-page')">⬅</div><h2>注音配對</h2><div style="width: 45px;"></div></div>
        <div class="dog-header" id="dog1"><div class="dog-head">🐶</div><div class="dog-msg" id="msg1"></div></div>
        <div class="cols-board"><div class="col-normal" id="g1-zh"></div><div class="col-normal" id="g1-zy"></div></div>
        <div id="congrats1" class="congrats-text">恭喜你全部配對成功！🎉</div>
    </div>

    <div id="game2-page" class="page">
        <div class="top-nav"><div class="icon-btn" onclick="showPage('menu-page')">⬅</div><h2>翻牌配對</h2><div style="width: 45px;"></div></div>
        <div class="dog-header" id="dog2"><div class="dog-head">🐶</div><div class="dog-msg" id="msg2"></div></div>
        <div class="memory-board" id="g2-board"></div>
        <div id="congrats2" class="congrats-text">恭喜你全部配對成功！🎉</div>
    </div>

    <div id="game3-page" class="page">
        <div class="top-nav"><div class="icon-btn" onclick="showPage('menu-page')">⬅</div><h2>餵食小狗</h2><div style="width: 45px;"></div></div>
        <div class="g3-anim-zone" id="g3-dog-anim">🐶</div>
        <div class="cols-board">
            <div id="g3-zh"></div> <div id="g3-zy"></div> </div>
    </div>

    <div id="game4-page" class="page">
        <div class="top-nav"><div class="icon-btn" onclick="showPage('menu-page')">⬅</div><h2>答題打怪</h2><div style="width: 45px;"></div></div>
        <div class="battle-arena">
            <div class="char-row">
                <div class="char-box">
                    <div class="hp-container"><div class="hp-bar" id="dog-hp"></div><div class="hp-text">小狗 HP</div></div>
                    <div class="sprite" id="b-dog">🐶</div>
                </div>
                <div style="font-size: 1.5rem; font-weight: bold; color: #ccc;">VS</div>
                <div class="char-box">
                    <div class="hp-container"><div class="hp-bar" id="mon-hp" style="background:var(--hp-red);"></div><div class="hp-text">怪獸 HP</div></div>
                    <div class="sprite" id="b-mon">👾</div>
                </div>
            </div>
            <div class="question-box" id="g4-q">題目載入中...</div>
            <div class="options-grid" id="g4-opts"></div>
        </div>
    </div>

    <script>
        const TARGET_DATE = "2026/04/21"; 
        const GOOGLE_SHEET_CSV_URL = "YOUR_GOOGLE_SHEET_CSV_URL_HERE"; 
        let currentVocabList = [];

        // 核心資料載入
        async function fetchDailyData() {
            try {
                let csvText = "";
                if(GOOGLE_SHEET_CSV_URL === "YOUR_GOOGLE_SHEET_CSV_URL_HERE") {
                    csvText = `日期,生詞,注音\n2026/04/21,學校,ㄒㄩㄝˊ ㄒㄧㄠˋ\n2026/04/21,作業,ㄗㄨㄛˋ ㄧㄝˋ\n2026/04/21,考試,ㄎㄠˇ ㄕˋ\n2026/04/21,老師,ㄌㄠˇ ㄕ\n2026/04/21,學生,ㄒㄩㄝˊ ㄕㄥ`;
                } else {
                    const res = await fetch(GOOGLE_SHEET_CSV_URL);
                    csvText = await res.text();
                }
                const rows = csvText.split('\n').map(r => r.trim()).filter(r => r);
                const headers = rows[0].split(',');
                const dIdx = headers.indexOf('日期') > -1 ? headers.indexOf('日期') : 0;
                const zhIdx = headers.indexOf('生詞') > -1 ? headers.indexOf('生詞') : 1;
                const zyIdx = headers.indexOf('注音') > -1 ? headers.indexOf('注音') : 2;
                currentVocabList = [];
                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(',');
                    if (cols.length >= 3 && cols[dIdx] === TARGET_DATE) {
                        currentVocabList.push({ zh: cols[zhIdx], zy: cols[zyIdx] });
                    }
                }
                document.getElementById('main-title').innerText = `${TARGET_DATE} 台灣華語小遊戲`;
                const listDiv = document.getElementById('vocab-list');
                listDiv.innerHTML = '';
                currentVocabList.forEach(v => {
                    listDiv.innerHTML += `<div class="vocab-item"><span>${v.zh}</span><span>${v.zy}</span></div>`;
                });
            } catch (e) { document.getElementById('main-title').innerText = "資料載入失敗"; }
        }
        window.onload = fetchDailyData;

        // 音效系統
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function playS(type) {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            if (type === 'success') {
                o.type = 'sine'; o.frequency.setValueAtTime(600, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                g.gain.setValueAtTime(0, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                o.start(); o.stop(audioCtx.currentTime + 0.3);
            } else {
                o.type = 'triangle'; o.frequency.setValueAtTime(300, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.2);
                g.gain.setValueAtTime(0, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                o.start(); o.stop(audioCtx.currentTime + 0.25);
            }
        }

        // 通用邏輯
        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }
        function dogR(n, s) {
            const d = document.getElementById(`dog${n}`); const m = document.getElementById(`msg${n}`);
            d.className = 'dog-header'; void d.offsetWidth;
            if(s === 'happy') { d.classList.add('happy'); m.innerText = "✨"; } else { d.classList.add('sad'); m.innerText = "加油!"; }
        }

        function openGame(n) {
            initAudio(); showPage(`game${n}-page`);
            const v = shuffle([...currentVocabList]).slice(0, 5); 
            if(n===1) initG1(v); if(n===2) initG2(v);
            if(n===3) initG3(v); if(n===4) initG4(currentVocabList);
        }

        // ================== Game 1：注音配對 ==================
        let g1SelZh = null, g1SelZy = null, g1Count = 0;
        function initG1(v) {
            g1SelZh = null; g1SelZy = null; g1Count = 0; document.getElementById('congrats1').style.display = 'none';
            const zh = document.getElementById('g1-zh'); const zy = document.getElementById('g1-zy');
            zh.innerHTML = ''; zy.innerHTML = '';
            shuffle([...v]).forEach(x => { let b = document.createElement('div'); b.className = 'card'; b.innerText = x.zh; b.onclick = () => { if(b.classList.contains('matched')) return; document.querySelectorAll('#g1-zh .card').forEach(c => c.classList.remove('selected')); b.classList.add('selected'); g1SelZh = { el: b, val: x.zh }; checkG1(v.length); }; zh.appendChild(b); });
            shuffle([...v]).forEach(x => { let b = document.createElement('div'); b.className = 'card'; b.innerText = x.zy; b.onclick = () => { if(b.classList.contains('matched')) return; document.querySelectorAll('#g1-zy .card').forEach(c => c.classList.remove('selected')); b.classList.add('selected'); g1SelZy = { el: b, val: x.zh }; checkG1(v.length); }; zy.appendChild(b); });
        }
        function checkG1(len) {
            if (g1SelZh && g1SelZy) {
                if (g1SelZh.val === g1SelZy.val) { playS('success'); dogR(1, 'happy'); g1SelZh.el.classList.replace('selected', 'matched'); g1SelZy.el.classList.replace('selected', 'matched'); g1Count++; if(g1Count === len) document.getElementById('congrats1').style.display = 'block'; } 
                else { playS('fail'); dogR(1, 'sad'); let a=g1SelZh.el, b=g1SelZy.el; setTimeout(() => { a.classList.remove('selected'); b.classList.remove('selected'); }, 400); }
                g1SelZh = null; g1SelZy = null;
            }
        }

        // ================== Game 2：翻牌配對 ==================
        let g2Flip = [], g2Lock = false, g2Count = 0;
        function initG2(v) {
            g2Flip = []; g2Lock = false; g2Count = 0; document.getElementById('congrats2').style.display = 'none';
            const b = document.getElementById('g2-board'); b.innerHTML = '';
            shuffle([...v, ...v]).forEach(x => {
                let c = document.createElement('div'); c.className = 'memory-card';
                c.innerHTML = `<div class="memory-card-inner"><div class="front">🌸</div><div class="back">${x.zh}</div></div>`;
                c.onclick = () => {
                    if (g2Lock || c.classList.contains('flipped') || c.classList.contains('matched')) return;
                    c.classList.add('flipped'); g2Flip.push({ el: c, val: x.zh });
                    if (g2Flip.length === 2) {
                        g2Lock = true;
                        if (g2Flip[0].val === g2Flip[1].val) { playS('success'); dogR(2, 'happy'); g2Flip[0].el.classList.add('matched'); g2Flip[1].el.classList.add('matched'); g2Count++; g2Flip = []; g2Lock = false; if(g2Count === v.length) document.getElementById('congrats2').style.display = 'block'; } 
                        else { playS('fail'); dogR(2, 'sad'); setTimeout(() => { g2Flip[0].el.classList.remove('flipped'); g2Flip[1].el.classList.remove('flipped'); g2Flip = []; g2Lock = false; }, 800); }
                    }
                }; b.appendChild(c);
            });
        }

        // ================== Game 3：餵食小狗 (數學座標偵測) ==================
        let dogSize = 1;
        function initG3(v) {
            dogSize = 1; const d = document.getElementById('g3-dog-anim'); d.style.transform = `scale(1)`; d.innerText = '🐶';
            const zh = document.getElementById('g3-zh'); const zy = document.getElementById('g3-zy');
            zh.innerHTML = ''; zy.innerHTML = '';
            shuffle([...v]).forEach(x => { let dz = document.createElement('div'); dz.className = 'dropzone'; dz.innerText = x.zy; dz.dataset.val = x.zh; zy.appendChild(dz); });
            shuffle([...v]).forEach(x => {
                let dr = document.createElement('div'); dr.className = 'card draggable'; dr.innerText = x.zh; dr.dataset.val = x.zh;
                let sx=0, sy=0;
                dr.addEventListener('pointerdown', (e) => { if(dr.classList.contains('matched')) return; dr.setPointerCapture(e.pointerId); sx = e.clientX; sy = e.clientY; d.innerText = '🐶'; dr.classList.add('dragging'); });
                dr.addEventListener('pointermove', (e) => { if(!dr.hasPointerCapture(e.pointerId)) return; dr.style.transform = `translate(${e.clientX - sx}px, ${e.clientY - sy}px) scale(1.05)`; });
                dr.addEventListener('pointerup', (e) => {
                    if(dr.classList.contains('matched') || !dr.hasPointerCapture(e.pointerId)) return;
                    dr.releasePointerCapture(e.pointerId); dr.classList.remove('dragging');
                    
                    // 【數學座標偵測】
                    let dz = null;
                    document.querySelectorAll('#g3-zy .dropzone').forEach(drop => {
                        let r = drop.getBoundingClientRect();
                        if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) { dz = drop; }
                    });

                    if (dz && !dz.classList.contains('matched') && dz.dataset.val === dr.dataset.val) { 
                        playS('success'); dr.classList.add('matched'); dz.classList.add('matched'); dr.style.transform = 'translate(0, 0)'; 
                        d.innerText = '🐶🍖'; setTimeout(() => { dogSize += 0.1; d.innerText = '🐕'; d.style.transform = `scale(${dogSize})`; }, 400); 
                    } 
                    else { playS('fail'); dr.style.transition = 'transform 0.3s'; dr.style.transform = 'translate(0, 0)'; d.innerText = '😭'; setTimeout(() => dr.style.transition = '', 300); }
                }); zh.appendChild(dr);
            });
        }

        // ================== Game 4：答題打怪 (20% 血量機制) ==================
        let hpD = 100, hpM = 100, pool = [], voc;
        function initG4(v) {
            voc = v; hpD = 100; hpM = 100; pool = shuffle([...v]); document.getElementById('b-dog').innerText = '🐶'; document.getElementById('b-mon').innerText = '👾'; upHP(); nextQ();
        }
        function upHP() { 
            document.getElementById('dog-hp').style.width = hpD + '%'; document.getElementById('mon-hp').style.width = hpM + '%'; 
            document.getElementById('dog-hp').style.background = hpD > 30 ? 'var(--hp-green)' : 'var(--hp-red)'; 
        }
        function nextQ() {
            if (hpM <= 0) { document.getElementById('b-mon').innerText = '💀'; document.getElementById('g4-q').innerText = '怪獸被打敗了！'; document.getElementById('g4-opts').innerHTML = `<button class="opt-btn" onclick="initG4(voc)">重新挑戰</button>`; playS('success'); return; }
            if (hpD <= 0) { document.getElementById('b-dog').innerText = '😵'; document.getElementById('g4-q').innerText = '小狗沒體力了...'; document.getElementById('g4-opts').innerHTML = `<button class="opt-btn" onclick="initG4(voc)">重新開始</button>`; playS('fail'); return; }
            if (pool.length === 0) pool = shuffle([...voc]);
            const q = pool.pop(); document.getElementById('g4-q').innerText = q.zh;
            let o = [q.zy]; while(o.length < 3) { let r = voc[Math.floor(Math.random() * voc.length)].zy; if(!o.includes(r)) o.push(r); }
            const div = document.getElementById('g4-opts'); div.innerHTML = '';
            shuffle(o).forEach(x => {
                let b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = x;
                b.onclick = () => {
                    document.querySelectorAll('.opt-btn').forEach(btn => btn.disabled = true);
                    if(x === q.zy) { 
                        document.getElementById('b-dog').style.animation = 'atkR 0.3s ease'; 
                        setTimeout(() => { playS('success'); document.getElementById('b-mon').style.animation = 'hitE 0.4s ease'; hpM = Math.max(0, hpM - 20); hpD = Math.min(100, hpD + 20); upHP(); }, 150); 
                    } else { 
                        document.getElementById('b-mon').style.animation = 'atkL 0.3s ease'; 
                        setTimeout(() => { playS('fail'); document.getElementById('b-dog').style.animation = 'hitE 0.4s ease'; hpD = Math.max(0, hpD - 20); hpM = Math.min(100, hpM + 20); upHP(); }, 150); 
                    }
                    setTimeout(() => { document.getElementById('b-dog').style.animation = ''; document.getElementById('b-mon').style.animation = ''; nextQ(); }, 1000);
                }; div.appendChild(b);
            });
        }
    </script>
</body>
</html>
