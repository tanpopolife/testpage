<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華語課程遊戲大廳</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap');

        body {
            /* 蒲公英絨毛般的奶油黃底色 */
            background-color: #FFFDF2; 
            /* 搭配黃色的溫暖可可棕色字體，保護小朋友眼睛 */
            color: #5D4037; 
            font-family: 'Nunito', 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 15px;
            margin: 0;
            min-height: 100vh;
        }

        h1 {
            /* 明亮的蒲公英金黃色 */
            color: #FFB300; 
            font-size: 2.2rem;
            text-align: center;
            text-shadow: 2px 2px 0px #FFF;
            margin-bottom: 30px;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        /* 可愛的按鈕設計 */
        .menu-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #fff;
            color: #8D6E63; /* 柔和的拿鐵棕色 */
            text-decoration: none; /* 移除超連結底線 */
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px 25px;
            border-radius: 20px;
            /* 蒲公英花瓣的柔和黃色 */
            border: 3px solid #FFE066; 
            box-shadow: 0 6px 10px rgba(255, 224, 102, 0.4);
            transition: all 0.2s ease;
        }

        .menu-btn:hover, .menu-btn:active {
            transform: translateY(-3px);
            /* 懸停時變成飽滿的柔和黃 */
            background-color: #FFE066; 
            color: #5D4037;
            box-shadow: 0 8px 15px rgba(255, 179, 0, 0.3);
        }

        .icon {
            font-size: 2rem;
        }
        
        .locked-btn {
            background-color: #f9f9f9;
            color: #bcaaa4;
            border-color: #e0e0e0;
            box-shadow: none;
            cursor: not-allowed;
        }
        
        .locked-btn:hover {
            transform: none;
            background-color: #f9f9f9;
            color: #bcaaa4;
        }
    </style>
</head>
<body>

    <h1>🌼 蒲公英老師的華語小遊戲 🌼</h1>

    <div class="menu-container">
        <a href="game_0530.html" class="menu-btn">
            <span>📅 5/30 課程挑戰</span>
            <span class="icon">🐶</span>
        </a>

        <a href="#" class="menu-btn locked-btn">
            <span>📅 6/06 敬請期待</span>
            <span class="icon">🔒</span>
        </a>
        
        <a href="#" class="menu-btn locked-btn">
            <span>📅 6/13 敬請期待</span>
            <span class="icon">🔒</span>
        </a>
    </div>

</body>
</html>
